version: 2

models:
  - name: stg_customers
    description: "Cleaned and renamed customer records. One row per customer."
    columns:
      - name: customer_id
        description: "Primary key"
        data_tests:
          - unique
          - not_null
      - name: email
        data_tests:
          - not_null
      - name: loyalty_tier
        data_tests:
          - not_null
          - accepted_values:
              values: ["BRONZE", "SILVER", "GOLD", "PLATINUM"]

  - name: stg_transactions
    description: "Cleaned transactions. Excludes quarantined rows from PySpark."
    columns:
      - name: transaction_id
        data_tests:
          - unique
          - not_null
      - name: customer_id
        data_tests:
          - not_null
      - name: amount
        data_tests:
          - not_null
      - name: channel
        data_tests:
          - accepted_values:
              values: ["web", "mobile_app", "in_store", "call_center"]

  - name: stg_loyalty_events
    description: "Loyalty tier change events per customer."
    columns:
      - name: customer_id
        data_tests:
          - not_null
      - name: event_date
        data_tests:
          - not_null

  - name: stg_support_ticket_messages
    description: "Flattened support ticket messages. One row per message."
    columns:
      - name: ticket_id
        data_tests:
          - not_null
      - name: customer_id
        data_tests:
          - not_null
